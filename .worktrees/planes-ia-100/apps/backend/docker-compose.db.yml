services:
  mysql:
    image: mysql:8.4
    container_name: nutrifit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nutrifit_supervisor
      MYSQL_USER: nutrifit
      MYSQL_PASSWORD: nutrifit
    ports:
      - "3306:3306"
    volumes:
      - nutrifit_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: nutrifit-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  minio:
    image: minio/minio:latest
    container_name: nutrifit-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - nutrifit_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nutrifit_mysql_data:
  nutrifit_minio_data:
